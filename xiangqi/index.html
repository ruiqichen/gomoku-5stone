<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国象棋</title>
    <!-- 复用五子棋的大部分基础样式结构，稍作定制 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div style="position: relative; width: 100%; text-align: center; margin-bottom: 10px;">
            <a href="../index.html" class="back-btn">⬅ 返回大厅</a>
            <h1 style="margin: 0;">中国象棋</h1>
        </div>
        
        <div class="controls">
            <select id="mode-select" style="padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #34495e; color: white; outline: none; cursor: pointer; margin-right: 10px;">
                <option value="pvp">双人对战 (PvP)</option>
                <option value="pve" selected>人机对战 (PvE)</option>
            </select>
            <div class="status">
                <span id="turn-indicator">当前回合: <b style="color: #e74c3c;">红方</b></span>
            </div>
            <button id="undo-btn">悔棋</button>
            <button id="restart-btn">重新开始</button>
            <button id="fullscreen-btn">全屏模式</button>
        </div>
        
        <div class="board-container" style="position: relative;">
            <canvas id="game-board"></canvas>
            <div id="check-toast" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); opacity: 0; pointer-events: none; font-size: 64px; font-weight: bold; color: #e74c3c; text-shadow: 0 0 20px rgba(0,0,0,0.8), 2px 2px 0 #fff; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;">将军!</div>
        </div>
    </div>
    
    <!-- 自定义游戏结束模态框 -->
    <div class="modal-overlay" id="game-over-modal">
        <div class="modal-content">
            <h2 class="modal-title" id="winner-text">红方 获胜！</h2>
            <button class="modal-btn" id="modal-restart-btn">再来一局</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
